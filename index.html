<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网址导航</title>
    <style>
        :root {
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            --gradient-3: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --bg-light: #fafafa;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
            --card-hover-shadow: 0 8px 30px rgba(0,0,0,0.12);
            --visit-btn: #48bb78;
            --copy-btn: #ed8936;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            background-color: var(--bg-light);
            color: var(--text-primary);
            padding: 16px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .page-title {
            text-align: center;
            margin: 32px 0 48px;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        /* 二维码区域 */
        .qr-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 24px;
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 40px;
            box-shadow: var(--card-shadow);
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .qr-header:hover {
            transform: translateY(-3px);
        }

        .qr-code img {
            width: 140px;
            height: 140px;
            border-radius: 12px;
            border: 4px solid #f0f4ff;
            padding: 8px;
        }

        .qr-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .platform {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .apple {
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        .android {
            background-color: #e6f4ea;
            color: #34a853;
        }

        .platform-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .platform-text .title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .platform-text .version {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .platform-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .platform-text a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* 导航区域 */
        .speed-section {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .speed-section:hover {
            box-shadow: var(--card-hover-shadow);
        }

        .section-title {
            padding: 16px 20px;
            border-radius: 12px;
            margin: -24px -24px 24px -24px;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--white);
            letter-spacing: 0.5px;
        }

        .T001 .section-title { background: var(--gradient-1); }
        .T002 .section-title { background: var(--gradient-2); }
        .T003 .section-title { background: var(--gradient-3); }

        .server-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            list-style: none;
        }

        .server-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.2s ease;
            border: 1px solid #f0f0f0;
        }

        .server-item:hover {
            transform: translateX(5px);
            background: #f0f4ff;
            border-color: #e1e7ff;
        }

        .server-item span {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            word-break: break-all;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .visit-btn, .copy-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .visit-btn {
            background: var(--visit-btn);
            color: var(--white);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .visit-btn:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .copy-btn {
            background: var(--copy-btn);
            color: var(--white);
        }

        .copy-btn:hover {
            background: #dd6b20;
            transform: translateY(-2px);
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 40px 20px 20px;
            color: var(--text-secondary);
            font-size: 14px;
            border-top: 1px solid #e2e8f0;
            margin-top: 48px;
        }

        /* 响应式优化 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.75rem;
                margin: 24px 0 32px;
            }

            .qr-code img {
                width: 120px;
                height: 120px;
            }

            .server-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .btn-group {
                width: 100%;
                justify-content: flex-end;
            }

            .visit-btn, .copy-btn {
                padding: 10px 20px;
                width: 50%;
            }
        }

        @media (max-width: 480px) {
            .platform {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .btn-group {
                flex-direction: column;
                gap: 8px;
            }

            .visit-btn, .copy-btn {
                width: 100%;
            }
        }
    </style>

        <section class="speed-section T001">
            <h2 class="section-title">B25加两字母.com</h2>
            <ul class="server-list" id="T001"></ul>
        </section>

        <section class="speed-section T002">
            <h2 class="section-title">B35加两字母.com</h2>
            <ul class="server-list" id="T002"></ul>
        </section>

        <section class="speed-section T003">
            <h2 class="section-title">B25、B35加两数字.com</h2>
            <ul class="server-list" id="T003"></ul>
        </section>
    </div>

    <script>
        // 配置数据（保持原数据不变）
        const servers = {
            T001: [
                'B25ff.com',
                'B25gg.com',
                'B25ww.com'
            ],
            T002: [
                'B35bb.com',
                'B35dd.com',
                'B35gg.com'
            ],
            T003: [
                'B2501.com',
                'B2502.com',
                'B3503.com',
                'B3509.com'
            ],
        };

        // 初始化DOM
        function initDom() {
            for (const [group, domains] of Object.entries(servers)) {
                const list = document.getElementById(group);
                domains.forEach(domain => {
                    const li = document.createElement('li');
                    li.className = 'server-item';
                    li.innerHTML = `
                        <span>${domain}</span>
                        <div class="btn-group">
                            <button class="copy-btn"><i class="fas fa-copy mr-1"></i> 复制网址</button>
                            <a href="http://${domain}" target="_blank" class="visit-btn"><i class="fas fa-external-link-alt mr-1"></i> 访问网站</a>
                        </div>
                    `;
                    list.appendChild(li);
                });
            }

            // 添加复制功能
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const domain = btn.closest('.server-item').querySelector('span').textContent;
                    navigator.clipboard.writeText(domain)
                        .then(() => {
                            // 复制成功提示优化
                            const originalText = btn.innerHTML;
                            btn.innerHTML = '<i class="fas fa-check mr-1"></i> 已复制';
                            btn.style.background = '#38a169';
                            setTimeout(() => {
                                btn.innerHTML = originalText;
                                btn.style.background = 'var(--copy-btn)';
                            }, 1500);
                        })
                        .catch(() => alert('复制失败，请手动复制'));
                });
            });
        }

        // 初始化
        initDom();
    </script>
